<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WowoClean - Tracking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center">
            <h1>WowoClean B3 Tracking</h1>
            <div class="badge bg-primary fs-5" id="totalWeightDisplay">Total Muatan: 0 kg</div>
        </div>

        <div class="card my-4">
            <div class="card-body">
                <h5>Tambah Kontainer Baru</h5>
                <form id="containerForm" class="row g-3">
                    <div class="col-md-3">
                        <input type="text" id="cid" class="form-control" placeholder="ID (Contoh: GD12345)">
                        <div class="text-danger small" id="err_cid"></div>
                    </div>
                    <div class="col-md-3">
                        <select id="wtype" class="form-select">
                            <option value="Chemical">Chemical</option>
                            <option value="Medical">Medical</option>
                            <option value="Electronic">Electronic</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="wkg" class="form-control" placeholder="Berat (kg)">
                        <div class="text-danger small" id="err_wkg"></div>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr><th>ID Kontainer</th><th>Tipe Limbah</th><th>Berat</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="containerTable"></tbody>
        </table>
    </div>

    <script>
        const api = axios.create({ baseURL: 'http://127.0.0.1:8000/api' });

        async function loadData() {
            try {
                const res = await api.get('/containers');
                const tbody = document.getElementById('containerTable');
                let total = 0;
                
                tbody.innerHTML = res.data.map(item => {
                    total += parseInt(item.weight_kg);
                    return `<tr>
                        <td>${item.container_id}</td>
                        <td>${item.waste_type}</td>
                        <td>${item.weight_kg} kg</td>
                        <td><span class="badge ${item.status==='Active'?'bg-info':'bg-secondary'}">${item.status}</span></td>
                        <td>
                            <button onclick="alert('Archived')" class="btn btn-sm btn-warning">Archive</button>
                            <button onclick="confirm('Hapus?') && alert('Deleted')" class="btn btn-sm btn-danger">Hapus</button>
                        </td>
                    </tr>`;
                }).join('');
                
                document.getElementById('totalWeightDisplay').innerText = `Total Muatan: ${total} kg`;
            } catch (e) { console.error("Koneksi API Gagal", e); }
        }

        document.getElementById('containerForm').onsubmit = async (e) => {
            e.preventDefault();
            // Reset pesan error
            document.getElementById('err_cid').innerText = '';
            document.getElementById('err_wkg').innerText = '';

            try {
                await api.post('/containers', {
                    container_id: document.getElementById('cid').value,
                    waste_type: document.getElementById('wtype').value,
                    weight_kg: document.getElementById('wkg').value
                });
                alert("Data Berhasil Ditambah!");
                loadData(); // Langsung render ulang tabel
            } catch (err) {
                if (err.response && err.response.status === 422) {
                    const errors = err.response.data.errors;
                    if (errors.container_id) document.getElementById('err_cid').innerText = errors.container_id[0];
                    if (errors.weight_kg) document.getElementById('err_wkg').innerText = errors.weight_kg[0];
                }
            }
        };

        // Panggil data pertama kali halaman dimuat
        loadData();
    </script>
</body>
</html>
